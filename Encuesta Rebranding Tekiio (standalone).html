document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1a1cf800-0ce4-4bc2-b5fe-27dd15970645\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  \n  \n  <style>/* ============================================================\n   Deployday — Webfonts\n   Helvetica family supplied by the brand. Rounded Bold is the\n   signature voice; Compressed/Condensed for impact + data;\n   Light for body copy.\n   ============================================================ */\n\n@font-face {\n  font-family: \"HelveticaRounded\";\n  src: url(\"bce4186c-57db-4955-a92e-6a2e735d45df\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"HelveticaCompressed\";\n  src: url(\"06ddca1e-fbe1-42a9-bcd2-ba8ac91fe212\") format(\"opentype\");\n  font-weight: 400 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"HelveticaCondensed\";\n  src: url(\"67b3e176-e84f-420d-a718-38782fcaeb81\") format(\"truetype\");\n  font-weight: 400 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"HelveticaLight\";\n  src: url(\"bcac281c-fb3b-4c8f-97fb-168e36ddca37\") format(\"truetype\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Oblique registered against the Light family for italic body */\n@font-face {\n  font-family: \"HelveticaLight\";\n  src: url(\"f5745bee-fb28-47cc-8407-9d9b291a81fc\") format(\"truetype\");\n  font-weight: 300 500;\n  font-style: italic;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Deployday — Color tokens\n   Brand cyan (#04aeed) + a precise near-black ink scale + white.\n   System-logic neutrals, creative-studio accent.\n   ============================================================ */\n\n:root {\n  /* ---- Brand cyan scale ---- */\n  --blue-50:  #e7f7fe;\n  --blue-100: #c2ebfc;\n  --blue-200: #8fdcf9;\n  --blue-300: #50c9f3;\n  --blue-400: #21bbef;\n  --blue-500: #04aeed;   /* PRIMARY — brand cyan */\n  --blue-600: #0390c6;\n  --blue-700: #03719b;\n  --blue-800: #02506e;\n  --blue-900: #013447;\n\n  /* ---- Ink (cool near-black neutral scale) ---- */\n  --ink-950: #0a0c0f;\n  --ink-900: #121620;   /* near-black surfaces */\n  --ink-800: #1d222c;\n  --ink-700: #2b313c;\n  --ink-600: #434b58;\n  --ink-500: #5d6675;\n  --ink-400: #818b9a;\n  --ink-300: #a8b0bd;\n  --ink-200: #cdd3dc;\n  --ink-100: #e7eaef;\n  --ink-50:  #f4f6f9;\n  --white:   #ffffff;\n  --black:   #000000;\n\n  /* ---- Semantic: text ---- */\n  --text-strong:  var(--ink-950);\n  --text-body:    var(--ink-700);\n  --text-muted:   var(--ink-500);\n  --text-subtle:  var(--ink-400);\n  --text-inverse: var(--white);\n  --text-brand:   var(--blue-600);\n  --text-on-brand:var(--white);\n\n  /* ---- Semantic: surfaces ---- */\n  --surface-page:    var(--white);\n  --surface-raised:  var(--white);\n  --surface-sunken:  var(--ink-50);\n  --surface-card:    var(--white);\n  --surface-inverse: var(--ink-950);\n  --surface-brand:   var(--blue-500);\n\n  /* ---- Semantic: borders / lines ---- */\n  --border-subtle: var(--ink-100);\n  --border-default:var(--ink-200);\n  --border-strong: var(--ink-300);\n  --border-brand:  var(--blue-500);\n  --border-inverse:rgba(255,255,255,0.14);\n\n  /* ---- Accent + focus ---- */\n  --accent:        var(--blue-500);\n  --accent-hover:  var(--blue-600);\n  --accent-press:  var(--blue-700);\n  --focus-ring:    rgba(4,174,237,0.40);\n\n  /* ---- Status ---- */\n  --success: #16a36b;\n  --warning: #e2a008;\n  --danger:  #e2483d;\n  --info:    var(--blue-500);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Deployday — Typography tokens\n   Display = Helvetica Rounded Bold (the brand voice)\n   Mega    = Helvetica Compressed (impact statements)\n   Label   = Helvetica Condensed (eyebrows, data, UI labels)\n   Body    = Helvetica Light\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display:   \"HelveticaRounded\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-mega:      \"HelveticaCompressed\", \"HelveticaRounded\", Arial, sans-serif;\n  --font-condensed: \"HelveticaCondensed\", \"Helvetica Neue\", \"Arial Narrow\", sans-serif;\n  --font-body:      \"HelveticaLight\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --font-sans:      \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --font-mono:      \"SFMono-Regular\", ui-monospace, Menlo, Consolas, monospace;\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ---- */\n  --text-2xs: 0.6875rem;  /* 11px */\n  --text-xs:  0.75rem;    /* 12px */\n  --text-sm:  0.875rem;   /* 14px */\n  --text-md:  1rem;       /* 16px — base */\n  --text-lg:  1.25rem;    /* 20px */\n  --text-xl:  1.5rem;     /* 24px */\n  --text-2xl: 2rem;       /* 32px */\n  --text-3xl: 2.75rem;    /* 44px */\n  --text-4xl: 3.75rem;    /* 60px */\n  --text-5xl: 5rem;       /* 80px */\n  --text-6xl: 7rem;       /* 112px */\n\n  /* ---- Weights ---- */\n  --weight-light:  300;\n  --weight-normal: 400;\n  --weight-bold:   700;\n\n  /* ---- Line heights ---- */\n  --leading-none:    1;\n  --leading-tight:   1.08;\n  --leading-snug:    1.25;\n  --leading-normal:  1.55;\n  --leading-relaxed: 1.7;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-label:  0.14em;  /* uppercase condensed eyebrows */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Deployday — Spacing, radii, shadows, layout, motion\n   8px base grid. Structured + modular.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing (8px grid) ---- */\n  --space-0:  0;\n  --spa  box-shadow: var(--shadow-focus);\n  border-radius: var(--radius-xs);\n}\n\nimg { max-width: 100%; display: block; }\n\n<\u002Fstyle>\n  <script src=\"699bb0ee-6ad5-481b-862b-121d70b233a8\"><\u002Fscript>\n  <script src=\"1e8ff3a0-fe8b-4685-bcbd-6d8c04da02d8\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"background:var(--surface-page);min-height:100vh\">\n\n  <div style=\"position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 40px\">\n    <img src=\"efd75fbd-1465-4dd0-99e6-18fc99595897\" alt=\"tekiio · deployday\" style=\"height:52px;width:auto;display:block\">\n    <div class=\"dd-eyebrow\" style=\"white-space:nowrap\">REBRANDING TEKIIO · SELECCIÓN DE GRUPOS GRÁFICOS · 2026<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:var(--container-lg);margin:0 auto;padding:var(--space-9) var(--space-6) var(--space-10)\">\n\n    <div style=\"max-width:720px;margin-bottom:var(--space-10)\">\n      <div class=\"dd-eyebrow\" style=\"margin-bottom:var(--space-3)\">ENCUESTA · DEFINICIÓN VISUAL<\u002Fdiv>\n      <h1 style=\"font-size:var(--text-4xl);margin-bottom:var(--space-4)\">Elegí las propuestas que mejor representan a Tekiio.<\u002Fh1>\n      <p style=\"font-family:var(--font-sans);font-weight:var(--weight-normal);font-size:var(--text-lg);color:var(--text-body);margin-bottom:var(--space-6)\">Cada grupo muestra una propuesta completa: logo sobre fondo claro, logo sobre fondo oscuro, isologo y una aplicación en una pieza real o simulada. Seleccioná todas las propuestas que te convenzan — podés elegir más de una.<\u002Fp>\n      <div style=\"max-width:360px;display:flex;flex-direction:column;gap:7px\">\n        <label for=\"tekiio-name-input\" style=\"font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:var(--text-xs);color:var(--ink-600)\">Tu nombre<\u002Flabel>\n        <input id=\"tekiio-name-input\" type=\"text\" placeholder=\"Nombre y apellido\" value=\"{{ name }}\" onchange=\"{{ onNameChange }}\" style=\"{{ nameInputStyle }}\">\n        <sc-if value=\"{{ nameError }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-family:var(--font-body);font-size:var(--text-sm);color:var(--danger)\">Este campo es obligatorio.<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ groups }}\" as=\"group\" hint-placeholder-count=\"4\">\n      <div style=\"{{ group.cardStyle }}\" data-screen-label=\"{{ group.label }}\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-5);flex-wrap:wrap\">\n          <div>\n            <h2 style=\"font-size:var(--text-2xl)\">{{ group.title }}<\u002Fh2>\n          <\u002Fdiv>\n          <button onclick=\"{{ group.toggle }}\" style=\"{{ group.buttonStyle }}\">\n            <span style=\"{{ group.dotStyle }}\">{{ group.checkMark }}<\u002Fspan>\n            {{ group.buttonLabel }}\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:var(--space-5)\">\n          <sc-for list=\"{{ group.pieces }}\" as=\"piece\" hint-placeholder-count=\"4\">\n            <div style=\"{{ piece.wrapStyle }}\">\n              <div style=\"position:relative\">\n                <x-import component-from-global-scope=\"image-slot\" from=\"0178a5cc-abef-4510-9a88-4d0d6a9fc749#/image-slot.js\" id=\"{{ piece.id }}\" style=\"width:100%;aspect-ratio:4/3;display:block;background:var(--surface-sunken)\" shape=\"rounded\" radius=\"12\" fit=\"contain\" placeholder=\"{{ piece.label }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n                <button onclick=\"{{ piece.zoom }}\" title=\"Ampliar\" style=\"position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border-default);background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-xs)\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"color:var(--ink-700)\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline><line x1=\"11\" y1=\"8\" x2=\"11\" y2=\"14\"><\u002Fline><line x1=\"8\" y1=\"11\" x2=\"14\" y2=\"11\"><\u002Fline><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <span style=\"font-family:var(--font-condensed);text-transform:uppercase;letter-spacing:0.06em;font-size:var(--text-xs);font-weight:700;color:var(--text-muted);text-align:center\">{{ piece.label }}<\u002Fspan>\n              <button onclick=\"{{ piece.toggle }}\" style=\"{{ piece.buttonStyle }}\">\n                <span style=\"{{ piece.dotStyle }}\">{{ piece.checkMark }}<\u002Fspan>\n                {{ piece.buttonLabel }}\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:var(--space-5)\">\n          <label style=\"font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:var(--text-xs);color:var(--ink-600);display:block;margin-bottom:7px\">Comentario sobre esta propuesta (opcional)<\u002Flabel>\n          <textarea rows=\"3\" placeholder=\"¿Qué te parece esta propuesta?\" value=\"{{ group.comment }}\" onchange=\"{{ group.onCommentChange }}\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;font-family:var(--font-body);font-size:var(--text-md);color:var(--text-strong);background:var(--surface-raised);border:1.5px solid var(--border-default);border-radius:var(--radius-md);resize:vertical;outline:none\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ showFinalComment }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:720px;margin-bottom:var(--space-8)\">\n        <label style=\"font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:var(--text-xs);color:var(--ink-600);display:block;margin-bottom:7px\">Comentario (opcional)<\u002Flabel>\n        <textarea rows=\"4\" placeholder=\"¿Algo más que quieras contarnos sobre tu elección?\" value=\"{{ comment }}\" onchange=\"{{ onCommentChange }}\" style=\"width:100%;box-sizing:border-box;padding:14px 16px;font-family:var(--font-body);font-size:var(--text-md);color:var(--text-strong);background:var(--surface-raised);border:1.5px solid var(--border-default);border-radius:var(--radius-md);resize:vertical;outline:none\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;align-items:center;gap:var(--space-5);flex-wrap:wrap\">\n      <button onclick=\"{{ onSubmit }}\" disabled=\"{{ submitting }}\" style=\"{{ submitButtonStyle }}\">{{ submitLabel }}<\u002Fbutton>\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <span class=\"dd-eyebrow\" style=\"color:var(--success)\">PDF descargado. ¡Gracias por responder!<\u002Fspan>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ formError }}\" hint-placeholder-val=\"{{ false }}\">\n        <span class=\"dd-eyebrow\" style=\"color:var(--danger)\">Completá tu nombre antes de enviar.<\u002Fspan>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ zoomOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeZoom }}\" style=\"position:fixed;inset:0;background:rgba(10,12,15,0.86);z-index:100;display:flex;align-items:center;justify-content:center;padding:var(--space-8);cursor:zoom-out\">\n      <div style=\"max-width:min(90vw, 900px);max-height:85vh;display:flex;flex-direction:column;align-items:center;gap:var(--space-4)\">\n        <img src=\"{{ zoomSrc }}\" alt=\"{{ zoomLabel }}\" style=\"max-width:100%;max-height:75vh;object-fit:contain;border-radius:var(--radius-lg);background:#fff;box-shadow:var(--shadow-lg)\">\n        <div style=\"display:flex;align-items:center;gap:var(--space-4)\">\n          <span class=\"dd-eyebrow\" style=\"color:#fff\">{{ zoomLabel }}<\u002Fspan>\n          <button onclick=\"{{ closeZoom }}\" style=\"width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;numberOfProposals&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:4,&quot;min&quot;:2,&quot;max&quot;:8,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Comportamiento&quot;},&quot;showFinalComment&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Comportamiento&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    name: '',\n    comment: '',\n    selections: {},\n    pieceSelections: {},\n    groupComments: {},\n    submitting: false,\n    submitted: false,\n    formError: false,\n    nameError: false,\n    zoomSrc: null,\n    zoomLabel: '',\n  };\n\n  PIECES = [\n    { key: 'claro', label: 'Logo sobre fondo claro' },\n    { key: 'oscuro', label: 'Logo sobre fondo oscuro' },\n    { key: 'isologo', label: 'Isologo' },\n    { key: 'aplicacion', label: 'Aplicación en una pieza real o simulada' },\n  ];\n\n  getGroups() {\n    const count = Math.max(1, Math.min(8, parseInt(this.props.numberOfProposals, 10) || 4));\n    return Array.from({ length: count }, (_, i) => {\n      const n = i + 1;\n      const key = `p${n}`;\n      return {\n        key,\n        label: `PROPUESTA ${String(n).padStart(2, '0')}`,\n        title: `Propuesta ${n}`,\n        pieces: this.PIECES.map((p) => ({ id: `${key}-${p.key}`, label: p.label })),\n      };\n    });\n  }\n\n  toggleGroup(key) {\n    this.setState((s) => {\n      const selections = { ...s.selections };\n      if (selections[key]) delete selections[key];\n      else selections[key] = true;\n      return { selections };\n    });\n  }\n\n  togglePiece(id) {\n    this.setState((s) => {\n      const pieceSelections = { ...s.pieceSelections };\n      if (pieceSelections[id]) delete pieceSelections[id];\n      else pieceSelections[id] = true;\n      return { pieceSelections };\n    });\n  }\n\n  onNameChange(e) {\n    this.setState({ name: e.target.value, nameError: false, formError: false });\n  }\n\n  onCommentChange(e) {\n    this.setState({ comment: e.target.value });\n  }\n\n  onGroupCommentChange(key, e) {\n    const value = e.target.value;\n    this.setState((s) => ({ groupComments: { ...s.groupComments, [key]: value } }));\n  }\n\n  openZoom(id, label) {\n    const el = document.getElementById(id);\n    const imgEl = el && el.shadowRoot && el.shadowRoot.querySelector('img');\n    if (!imgEl || !imgEl.src || imgEl.style.display === 'none') return;\n    this.setState({ zoomSrc: imgEl.src, zoomLabel: label });\n  }\n\n  closeZoom() {\n    this.setState({ zoomSrc: null, zoomLabel: '' });\n  }\n\n  waitForJsPDF() {\n    return new Promise((resolve) => {\n      let tries = 0;\n      const check = () => {\n        if (window.jspdf && window.jspdf.jsPDF) resolve(window.jspdf.jsPDF);\n        else if (tries++ > 60) resolve(null);\n        else setTimeout(check, 100);\n      };\n      check();\n    });\n  }\n\n  getSlotImage(id) {\n    return new Promise((resolve) => {\n      const el = document.getElementById(id);\n      const imgEl = el && el.shadowRoot && el.shadowRoot.querySelector('img');\n      if (!imgEl || !imgEl.src || imgEl.style.display === 'none') { resolve(null); return; }\n      const im = new Image();\n      im.onload = () => {\n        try {\n          const c = document.createElement('canvas');\n          c.width = im.naturalWidth; c.height = im.naturalHeight;\n          c.getContext('2d').drawImage(im, 0, 0);\n          resolve({ dataUrl: c.toDataURL('image/jpeg', 0.85), w: im.naturalWidth, h: im.naturalHeight });\n        } catch (err) { resolve(null); }\n      };\n      im.onerror = () => resolve(null);\n      im.src = imgEl.src;\n    });\n  }\n\n  async handleSubmit() {\n    if (!this.state.name.trim()) {\n      this.setState({ nameError: true, formError: true });\n      return;\n    }\n    this.setState({ submitting: true, submitted: false, formError: false });\n    try {\n      await this.generatePdf();\n      this.setState({ submitted: true });\n    } finally {\n      this.setState({ submitting: false });\n    }\n  }\n\n  loadImageAsset(src) {\n    return new Promise((resolve) => {\n      const im = new Image();\n      im.crossOrigin = 'anonymous';\n      im.onload = () => {\n        try {\n          const c = document.createElement('canvas');\n          c.width = im.naturalWidth; c.height = im.naturalHeight;\n          c.getContext('2d').drawImage(im, 0, 0);\n          resolve({ dataUrl: c.toDataURL('image/png'), w: im.naturalWidth, h: im.naturalHeight });\n        } catch (e) { resolve(null); }\n      };\n      im.onerror = () => resolve(null);\n      im.src = src;\n    });\n  }\n\n  async generatePdf() {\n    const jsPDFCtor = await this.waitForJsPDF();\n    if (!jsPDFCtor) { alert('No se pudo generar el PDF. Reintentá en unos segundos.'); return; }\n    const doc = new jsPDFCtor({ unit: 'pt', format: 'a4' });\n    const pageW = doc.internal.pageSize.getWidth();\n    const pageH = doc.internal.pageSize.getHeight();\n    const marginX = 40;\n    const bottomLimit = pageH - 46;\n    const cyan = [4, 174, 237];\n    const cyanTint = [224, 246, 253];\n    const ink = [10, 12, 15];\n    const muted = [93, 102, 117];\n    const line = [225, 228, 233];\n    const cardBg = [252, 253, 254];\n\n    let y = 0;\n    let pageNum = 1;\n\n    const drawHeader = () => {\n      doc.setFillColor(...ink);\n      doc.rect(0, 0, pageW, 6, 'F');\n      doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5); doc.setTextColor(...cyan);\n      doc.text('REBRANDING TEKIIO', marginX, 26);\n      doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...muted);\n      doc.text('ENCUESTA DE SELECCIÓN · 2026', pageW - marginX, 26, { align: 'right' });\n      doc.setDrawColor(...line);\n      doc.line(marginX, 34, pageW - marginX, 34);\n      y = 56;\n    };\n\n    const drawFooter = () => {\n      doc.setFont('helvetica', 'normal'); doc.setFontSize(8);\n      doc.setTextColor(...muted);\n      doc.text(`tekiio · deployday — página ${pageNum}`, pageW / 2, pageH - 22, { align: 'center' });\n    };\n\n    const newPage = () => {\n      drawFooter();\n      doc.addPage();\n      pageNum += 1;\n      drawHeader();\n    };\n\n    const ensureSpace = (h) => {\n      if (y + h > bottomLimit) newPage();\n    };\n\n    drawHeader();\n\n    // Try to render the actual brand lockup image at the top for parity with the HTML header.\n    const lockup = await this.loadImageAsset('assets/header-lockup.png');\n    if (lockup) {\n      const lockupH = 22;\n      const lockupW = (lockup.w / lockup.h) * lockupH;\n      doc.addImage(lockup.dataUrl, 'PNG', marginX, y, lockupW, lockupH);\n      y += lockupH + 22;\n    }\n\n    doc.setFont('helvetica', 'bold'); doc.setFontSize(21); doc.setTextColor(...ink);\n    doc.text('Resumen de respuestas', marginX, y);\n    y += 20;\n    doc.setFont('helvetica', 'normal'); doc.setFontSize(10.5); doc.setTextColor(...muted);\n    const dateStr = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });\n    doc.text(`Respondido por ${this.state.name.trim()} · ${dateStr}`, marginX, y);\n    y += 26;\n\n    const groups = this.getGroups();\n    const selectedGroups = groups.filter((g) => this.state.selections[g.key]);\n\n    // Summary pill/banner, like the confirmation state in the HTML.\n    const summaryText = selectedGroups.length\n      ? `Propuestas seleccionadas: ${selectedGroups.map((g) => g.title).join(', ')}`\n      : 'No se seleccionó ninguna propuesta.';\n    doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5);\n    const summaryLines = doc.splitTextToSize(summaryText, pageW - marginX * 2 - 28);\n    const summaryH = summaryLines.length * 13 + 18;\n    ensureSpace(summaryH + 14);\n    doc.setFillColor(...cyanTint);\n    doc.roundedRect(marginX, y, pageW - marginX * 2, summaryH, 8, 8, 'F');\n    doc.setTextColor(4, 120, 163);\n    let sy = y + 20;\n    for (const l of summaryLines) { doc.text(l, marginX + 14, sy); sy += 13; }\n    y += summaryH + 26;\n\n    const contentW = pageW - marginX * 2;\n    const gap = 12;\n    const thumbW = (contentW - 24 - gap * 3) / 4;\n    const thumbH = thumbW * 0.75;\n\n    for (const g of groups) {\n      const selected = !!this.state.selections[g.key];\n      const groupComment = (this.state.groupComments[g.key] || '').trim();\n      const commentLines = groupComment ? doc.splitTextToSize(groupComment, contentW - 24 - 20) : [];\n      const cardPad = 18;\n      const headerH = 26;\n      const imagesH = thumbH + 24;\n      const commentH = groupComment ? (commentLines.length * 12 + 24) : 0;\n      const cardH = cardPad + headerH + imagesH + (groupComment ? 14 + commentH : 0) + cardPad;\n\n      ensureSpace(cardH + 20);\n\n      // Card container\n      doc.setFillColor(...cardBg);\n      doc.setDrawColor(...(selected ? cyan : line));\n      doc.setLineWidth(selected ? 1.4 : 1);\n      doc.roundedRect(marginX, y, contentW, cardH, 10, 10, 'FD');\n      doc.setLineWidth(1);\n\n      let cy = y + cardPad + 6;\n      doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(...ink);\n      doc.text(g.title, marginX + cardPad, cy);\n\n      if (selected) {\n        doc.setFont('helvetica', 'bold'); doc.setFontSize(8);\n        const badge = 'SELECCIONADA';\n        const bw = doc.getTextWidth(badge) + 18;\n        const bx = marginX + contentW - cardPad - bw;\n        doc.setFillColor(...cyan);\n        doc.roundedRect(bx, cy - 12, bw, 17, 8.5, 8.5, 'F');\n        doc.setTextColor(255, 255, 255);\n        doc.text(badge, bx + bw / 2, cy - 0.5, { align: 'center' });\n      }\n\n      cy += 18;\n      let x = marginX + cardPad;\n      for (const piece of g.pieces) {\n        const pSelected = !!this.state.pieceSelections[piece.id];\n        const img = await this.getSlotImage(piece.id);\n        doc.setFillColor(248, 249, 250);\n        doc.setDrawColor(...(pSelected ? cyan : [210, 214, 222]));\n        doc.setLineWidth(pSelected ? 1.6 : 1);\n        doc.roundedRect(x, cy, thumbW, thumbH, 6, 6, 'FD');\n        doc.setLineWidth(1);\n        if (img) {\n          try {\n            const scale = Math.min((thumbW - 10) / img.w, (thumbH - 10) / img.h);\n            const drawW = img.w * scale;\n            const drawH = img.h * scale;\n            const dx = x + (thumbW - drawW) / 2;\n            const dy = cy + (thumbH - drawH) / 2;\n            doc.addImage(img.dataUrl, 'JPEG', dx, dy, drawW, drawH);\n          } catch (e) {}\n        }\n        if (pSelected) {\n          doc.setFillColor(...cyan);\n          doc.circle(x + thumbW - 9, cy + 9, 7, 'F');\n          doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(255, 255, 255);\n          doc.text('✓', x + thumbW - 9, cy + 11.5, { align: 'center' });\n        }\n        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(...muted);\n        const pLines = doc.splitTextToSize(piece.label, thumbW);\n        let ly = cy + thumbH + 10;\n        for (const l of pLines.slice(0, 2)) { doc.text(l, x, ly); ly += 8.5; }\n        x += thumbW + gap;\n      }\n\n      if (groupComment) {\n        const cby = cy + imagesH + 8;\n        doc.setFillColor(246, 247, 248);\n        doc.roundedRect(marginX + cardPad, cby, contentW - cardPad * 2, commentH, 6, 6, 'F');\n        doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(...ink);\n        doc.text('COMENTARIO', marginX + cardPad + 10, cby + 14);\n        doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(...muted);\n        let ccy = cby + 27;\n        for (const l of commentLines) { doc.text(l, marginX + cardPad + 10, ccy); ccy += 12; }\n      }\n\n      y += cardH + 20;\n    }\n\n    if (this.props.showFinalComment ?? true) {\n      const commentText = this.state.comment.trim() || 'Sin comentarios.';\n      const finalLines = doc.splitTextToSize(commentText, contentW - 24);\n      const boxH = finalLines.length * 13 + 40;\n      ensureSpace(boxH + 10);\n      doc.setDrawColor(...line);\n      doc.setFillColor(...cardBg);\n      doc.roundedRect(marginX, y, contentW, boxH, 10, 10, 'FD');\n      doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(...ink);\n      doc.text('Comentario final', marginX + 16, y + 20);\n      doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...muted);\n      let fcy = y + 36;\n      for (const l of finalLines) { doc.text(l, marginX + 16, fcy); fcy += 13; }\n      y += boxH;\n    }\n\n    drawFooter();\n\n    const safeName = this.state.name.trim().replace(/[^a-zA-Z0-9-_ ]/g, '').replace(/\\s+/g, '-') || 'respuesta';\n    doc.save(`Tekiio-Rebranding-${safeName}.pdf`);\n  }\n\n  renderVals() {\n    const groups = this.getGroups().map((g) => {\n      const selected = !!this.state.selections[g.key];\n      const pieces = g.pieces.map((piece) => {\n        const pSelected = !!this.state.pieceSelections[piece.id];\n        return {\n          id: piece.id,\n          label: piece.label,\n          checkMark: pSelected ? '✓' : '',\n          buttonLabel: pSelected ? 'Seleccionada' : 'Seleccionar',\n          toggle: () => this.togglePiece(piece.id),\n          zoom: () =>       key: g.key,\n        label: g.label,\n        title: g.title,\n        pieces,\n        comment: this.state.groupComments[g.key] || '',\n        onCommentChange: (e) => this.onGroupCommentChange(g.key, e),\n        buttonLabel: selected ? 'Seleccionada' : 'Seleccionar propuesta',\n        checkMark: selected ? '✓' : '',\n        toggle: () => this.toggleGroup(g.key),\n        cardStyle: {\n          border: selected ? '2px solid var(--accent)' : '1.5px solid var(--border-default)',\n          boxShadow: selected ? 'var(--shadow-brand)' : 'var(--shadow-sm)',\n          borderRadius: 'var(--radius-lg)',\n          padding: 'var(--space-6)',\n          background: 'var(--surface-card)',\n          marginBottom: 'var(--space-8)',\n          transition: 'border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-base) var(--ease-out)',\n        },\n        buttonStyle: {\n          display: 'flex',\n          alignItems: 'center',\n          gap: 8,\n          padding: '10px 18px',\n          borderRadius: 'var(--radius-pill)',\n          border: selected ? '1.5px solid var(--accent)' : '1.5px solid var(--border-strong)',\n          background: selected ? 'var(--blue-50)' : 'transparent',\n          color: selected ? 'var(--accent-hover)' : 'var(--text-strong)',\n          fontFamily: 'var(--font-display)',\n          fontWeight: 700,\n          fontSize: 'var(--text-sm)',\n          cursor: 'pointer',\n          transition: 'border-color var(--dur-fast) var(--ease-standard), background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard)',\n        },\n        dotStyle: {\n          width: 18,\n          height: 18,\n          minWidth: 18,\n          borderRadius: '50%',\n          border: selected ? '1.5px solid var(--accent)' : '1.5px solid var(--border-strong)',\n          background: selected ? 'var(--accent)' : 'transparent',\n          color: '#fff',\n          fontSize: 12,\n          lineHeight: '16px',\n
